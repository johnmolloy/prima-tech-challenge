apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "prima-tech-challenge.fullname" . }}
  labels:
    app: {{ include "prima-tech-challenge.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "prima-tech-challenge.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "prima-tech-challenge.name" . }}
    spec:
      serviceAccountName: flask-app-sa
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: DYNAMODB_TABLE
              value: "prima-user-db"
            - name: S3_BUCKET_NAME
              value: "prima-tech-challenge-data-ff32d1ad"
            - name: PYTHONUNBUFFERED
              value: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10